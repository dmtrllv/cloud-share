<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" href="data:;base64,iVBORw0KGgo=">
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>cloud-share</title>
		<style>
			* {
				box-sizing: border-box;
			}

			html,
			body,
			#root {
				margin: 0;
				padding: 0;
				min-width: 100svw;
				max-width: 100svw;
				min-height: 100svh;
				overflow-x: hidden;
				font-family: sans-serif;
			}

			h3 {
				display: inline-block;
			}

			button {
				display: inline-block;
				background: rgba(0, 0, 0, 0.1);
				border: 1px solid white;
				border-radius: 6px;
				color: var(--fg-1);
				padding: 12px 48px;
				font-size: 16px;
				opacity: 0.65;
				transition: 150ms;
				cursor: pointer;
			}

			button:hover {
				opacity: 1;
			}

			input {
				position: relative;
				display: block;
				margin: 15px 0px;
				font-size: 18px;
				background: transparent;
				border: 0px;
				border-bottom: 1px solid white;
				color: var(--fg-1);
				padding: 2px 23px;
				opacity: 0.65;
				outline: none;
				transition: 150ms;

				&::-webkit-input-placeholder {
					color: var(--fg-1);
				}

				&::-moz-placeholder {
					color: var(--fg-1);
				}

				&:-ms-input-placeholder {
					color: var(--fg-1);
				}

				&:-moz-placeholder {
					color: var(--fg-1);
				}

				&:active,
				&:focus {
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
